services:
  - type: web
    name: aitudesk-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run render:build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: EXTRA_CORS_ORIGINS
        value: ""
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: MAX_FILES_PER_TICKET
        value: "5"
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_AGENT_PASSWORD
        sync: false
      - key: SEED_USER_PASSWORD
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
